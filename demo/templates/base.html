<!DOCTYPE html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JARVIS — Maintenance KB{% endblock %}</title>
  <style>
    :root {
      --teal: #4a9d9c;
      --bg: #f4f4f4;
      --line: #ddd;
    }

    * { box-sizing: border-box; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      margin: 0;
      padding: 0 0 40px;
      color: #222;
    }

    .nav {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
      display: flex;
      gap: 4px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .nav a {
      padding: 16px 18px;
      text-decoration: none;
      color: #555;
      font-size: 14px;
      border-bottom: 3px solid transparent;
    }

    .nav a:hover { color: var(--teal); }
    .nav a.active { color: var(--teal); border-bottom-color: var(--teal); font-weight: 600; }

    .wrap { max-width: 920px; margin: 0 auto; padding: 24px; }

    h1 { font-size: 22px; }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 18px;
    }

    label { font-weight: 600; display: block; margin: 12px 0 6px; }

    input[type=file], input[type=text], textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
    }

    textarea { min-height: 70px; font-family: inherit; }

    .hint { color: #888; font-size: 12px; margin-top: 4px; }

    button {
      background: var(--teal);
      color: #fff;
      border: 0;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      margin-top: 16px;
    }

    button:hover { opacity: .9; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }

    pre {
      background: #1e1e1e;
      color: #dcdcdc;
      padding: 14px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13px;
    }

    table { width: 100%; border-collapse: collapse; margin-top: 8px; }

    th, td { border: 1px solid var(--line); padding: 8px 10px; text-align: left; font-size: 14px; }

    th { background: #eef6f6; }

    .pill {
      display: inline-block;
      background: #eef6f6;
      color: var(--teal);
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    .flow { text-align: center; color: #666; font-size: 13px; margin: 6px 0 18px; }

    .mock {
      display: inline-block;
      background: #fff4e0;
      color: #b8860b;
      border: 1px solid #f0d090;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
    }

    {% block style %}{% endblock %}
  </style>
</head>

<body>
  <nav class="nav">
    <a href="/legacy" class="{{ 'active' if active=='capture' }}">📥 ป้อนข้อมูล</a>
    <a href="/stt" class="{{ 'active' if active=='stt' }}">🎙️ ทดสอบ STT</a>
    <a href="/search" class="{{ 'active' if active=='search' }}">🔍 ค้นเคส</a>
    <a href="/dashboard" class="{{ 'active' if active=='dashboard' }}">📊 Dashboard</a>
    <a href="/ask" class="{{ 'active' if active=='ask' }}">🤖 ถาม JARVIS</a>
  </nav>

  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>

</html>
